---
# ============================================================
# Perfil: default / dev — H2 em memória
# ============================================================
spring:
  config:
    activate:
      on-profile: default

  datasource:
    url: jdbc:h2:file:./data/matrizes;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

---
# ============================================================
# Perfil: prod — PostgreSQL Supabase
# ============================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    # Túnel Chisel local (iniciar-sistema.bat) → Session Pooler Supabase porta 6543
    url: jdbc:postgresql://localhost:6543/postgres?sslmode=disable&prepareThreshold=0
    username: postgres.mgmffwccsdomwzolqvhe
    password: Dacarto12345@@@
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: America/Sao_Paulo

  flyway:
    enabled: false

logging:
  level:
    com.dacarto.matrizes: INFO
    org.hibernate.SQL: WARN
